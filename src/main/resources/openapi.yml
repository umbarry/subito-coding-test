  "components": {
    "schemas": {
      "ProductRequest": {
        "type": "object",
        "properties": {
          "name": {
            "type": "string",
            "minLength": 1
          },
          "netPrice": {
            "type": "number"
          },
          "vatPercentage": {
            "type": "number"
          },
          "availableItems": {
            "type": "integer",
            "format": "int32"
          }
        },
        "required": [
          "availableItems",
          "name",
          "netPrice",
          "vatPercentage"
        ]
      },
      "ProductResponse": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "name": {
            "type": "string"
          },
          "netPrice": {
            "type": "number"
          },
          "vatPercentage": {
            "type": "number"
          },
          "availableItems": {
            "type": "integer",
            "format": "int32"
          }
        }
      },
      "BasketItemResponse": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "productId": {
            "type": "integer",
            "format": "int64"
          },
          "productName": {
            "type": "string"
          },
          "quantity": {
            "type": "integer",
            "format": "int32"
          },
          "unitNetPrice": {
            "type": "number"
          },
          "price": {
            "type": "number"
          },
          "vat": {
            "type": "number"
          },
          "total": {
            "type": "number"
          }
        }
      },
      "BasketResponse": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "totalPrice": {
            "type": "number"
          },
          "totalVat": {
            "type": "number"
          },
          "grandTotal": {
            "type": "number"
          },
          "items": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/BasketItemResponse"
            }
          }
        }
      },
      "BasketItemRequest": {
        "type": "object",
        "properties": {
          "productId": {
            "type": "integer",
            "format": "int64"
          },
          "quantity": {
            "type": "integer",
            "format": "int32"
          }
        }
      },
      "CreateOrderRequest": {
        "type": "object",
        "properties": {
          "basketId": {
            "type": "integer",
            "format": "int64"
          },
          "name": {
            "type": "string",
            "minLength": 1
          },
          "lastName": {
            "type": "string",
            "minLength": 1
          },
          "email": {
            "type": "string",
            "format": "email",
            "minLength": 1
          },
          "phoneNumber": {
            "type": "string",
            "minLength": 1,
            "pattern": "^\\+?[0-9]+$"
          },
          "street": {
            "type": "string",
            "minLength": 1
          },
          "city": {
            "type": "string",
            "minLength": 1
          },
          "postalCode": {
            "type": "string",
            "minLength": 1,
            "pattern": "^[0-9]+$"
          },
          "country": {
            "type": "string",
            "minLength": 1
          }
        },
        "required": [
          "basketId",
          "city",
          "country",
          "email",
          "lastName",
          "name",
          "phoneNumber",
          "postalCode",
          "street"
        ]
      },
      "OrderItemResponse": {
        "type": "object",
        "properties": {
          "productId": {
            "type": "integer",
            "format": "int64"
          },
          "productName": {
            "type": "string"
          },
          "quantity": {
            "type": "integer",
            "format": "int32"
          },
          "unitNetPrice": {
            "type": "number"
          },
          "price": {
            "type": "number"
          },
          "vat": {
            "type": "number"
          },
          "total": {
            "type": "number"
          }
        }
      },
      "OrderResponse": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "status": {
            "type": "string",
            "enum": [
              "INSERTED",
              "PAID",
              "SHIPPED",
              "EXPIRED"
            ]
          },
          "insertDate": {
            "type": "string",
            "format": "date-time"
          },
          "totalPrice": {
            "type": "number"
          },
          "totalVat": {
            "type": "number"
          },
          "grandTotal": {
            "type": "number"
          },
          "items": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/OrderItemResponse"
            }
          }
        }
      },
      "ShipOrderRequest": {
        "type": "object",
        "properties": {
          "trackingUrl": {
            "type": "string",
            "minLength": 1
          }
        },
        "required": [
          "trackingUrl"
        ]
      },
      "Pageable": {
        "type": "object",
        "properties": {
          "page": {
            "type": "integer",
            "format": "int32",
            "minimum": 0
          },
          "size": {
            "type": "integer",
            "format": "int32",
            "minimum": 1
          },
          "sort": {
            "type": "array",
            "items": {
              "type": "string"
            }
          }
        }
      },
      "PageProductResponse": {
        "type": "object",
        "properties": {
          "totalElements": {
            "type": "integer",
            "format": "int64"
          },
          "totalPages": {
            "type": "integer",
            "format": "int32"
          },
          "pageable": {
            "$ref": "#/components/schemas/PageableObject"
          },
          "size": {
            "type": "integer",
            "format": "int32"
          },
          "content": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/ProductResponse"
            }
          },
          "number": {
            "type": "integer",
            "format": "int32"
          },
          "sort": {
            "$ref": "#/components/schemas/SortObject"
          },
          "first": {
            "type": "boolean"
          },
          "last": {
            "type": "boolean"
          },
          "numberOfElements": {
            "type": "integer",
            "format": "int32"
          },
          "empty": {
            "type": "boolean"
          }
        }
      },
      "PageableObject": {
        "type": "object",
        "properties": {
          "paged": {
            "type": "boolean"
          },
          "pageNumber": {
            "type": "integer",
            "format": "int32"
          },
          "pageSize": {
            "type": "integer",
            "format": "int32"
          },
          "offset": {
            "type": "integer",
            "format": "int64"
          },
          "sort": {
            "$ref": "#/components/schemas/SortObject"
          },
          "unpaged": {
            "type": "boolean"
          }
        }
      },
      "SortObject": {
        "type": "object",
        "properties": {
          "sorted": {
            "type": "boolean"
          },
          "empty": {
            "type": "boolean"
          },
          "unsorted": {
            "type": "boolean"
          }
        }
      }
    }
  }
}